services:
  # === Game Server ===
  game-server:
    build:
      context: .
      dockerfile: Dockerfile.gameserver
    ports:
      - "8888:8888"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
      - ./challenges-source:/app/challenges-source
      - claude-patches:/patches/claude
      - gpt-patches:/patches/gpt
    networks:
      - game-net
    depends_on:
      - claude-axis
      - claude-ico
      - claude-nilua
      - gpt-axis
      - gpt-ico
      - gpt-nilua

  # === CLAUDE team services ===
  claude-axis:
    build:
      context: ./challenges-source/axis
      dockerfile: Dockerfile
    container_name: pulsar-claude-axis
    ports:
      - "14000:4000"
    networks:
      - game-net

  claude-ico:
    build:
      context: ./challenges-source/ico
      dockerfile: Dockerfile
    container_name: pulsar-claude-ico
    ports:
      - "14265:4265"
    networks:
      - game-net

  claude-nilua:
    build:
      context: ./challenges-source/nilua
      dockerfile: Dockerfile
      target: nilua
    platform: linux/amd64
    container_name: pulsar-claude-nilua
    ports:
      - "18080:8080"
    entrypoint: ["sh", "-c", "echo 'FLAG{placeholder}' > /flag && chmod 644 /flag && exec /challenge/nilua_server"]
    user: root
    networks:
      - game-net

  # === GPT team services ===
  gpt-axis:
    build:
      context: ./challenges-source/axis
      dockerfile: Dockerfile
    container_name: pulsar-gpt-axis
    ports:
      - "24000:4000"
    networks:
      - game-net

  gpt-ico:
    build:
      context: ./challenges-source/ico
      dockerfile: Dockerfile
    container_name: pulsar-gpt-ico
    ports:
      - "24265:4265"
    networks:
      - game-net

  gpt-nilua:
    build:
      context: ./challenges-source/nilua
      dockerfile: Dockerfile
      target: nilua
    platform: linux/amd64
    container_name: pulsar-gpt-nilua
    ports:
      - "28080:8080"
    entrypoint: ["sh", "-c", "echo 'FLAG{placeholder}' > /flag && chmod 644 /flag && exec /challenge/nilua_server"]
    user: root
    networks:
      - game-net

  # === Dashboard ===
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "9999:9999"
    environment:
      - GAME_SERVER=http://game-server:8888
      - LOG_DIR=/app/logs
    volumes:
      - ./logs:/app/logs:ro
    networks:
      - game-net
    depends_on:
      - game-server

  # === LLM Agent Containers ===
  # Each agent runs in its own container with NO Docker access.
  # Security: no docker socket, no docker CLI, challenges-source mounted read-only.

  agent-claude:
    build:
      context: .
      dockerfile: Dockerfile.agent-claude
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GAME_SERVER=http://game-server:8888
      - SOURCE_PATH=/app/challenges-source
      - PATCH_PATH=/patches
      - TEAM_ID=claude
    volumes:
      - ./challenges-source:/app/challenges-source:ro
      - claude-patches:/patches
      - ./logs:/app/logs
    networks:
      - game-net
    depends_on:
      - game-server

  agent-gpt:
    build:
      context: .
      dockerfile: Dockerfile.agent-gpt
    environment:
      - GAME_SERVER=http://game-server:8888
      - SOURCE_PATH=/app/challenges-source
      - PATCH_PATH=/patches
      - TEAM_ID=gpt
    volumes:
      - ./challenges-source:/app/challenges-source:ro
      - gpt-patches:/patches
      - ./logs:/app/logs
      - ${CODEX_AUTH_JSON:-~/.codex/auth.json}:/root/.codex/auth.json:ro
    networks:
      - game-net
    depends_on:
      - game-server

volumes:
  claude-patches:
  gpt-patches:

networks:
  game-net:
    driver: bridge
